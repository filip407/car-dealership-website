server {
    listen 80;
    resolver 127.0.0.11 valid=5s;
    set $upstream http://student-filipd-api:8080;
    location / {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
