name: student-dealership

services:
  db:
    image: postgres:16-alpine
    container_name: student-dealership-db
    environment:
      POSTGRES_USER:     ${DB_USER:-dealership}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dealership-demo-pass-2026}
      POSTGRES_DB:       ${DB_NAME:-dealership}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dealership}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [studlab_net]
    restart: unless-stopped

  api:
    build:
      context: .
    container_name: student-dealership-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=student-dealership-db;Port=5432;Database=${DB_NAME:-dealership};Username=${DB_USER:-dealership};Password=${DB_PASSWORD:-dealership-demo-pass-2026}"
      Jwt__Key: ${JWT_KEY:-dealership-jwt-key-2026-not-for-prod-min-32-chars-pls-replace}
      ASPNETCORE_ENVIRONMENT: Production
    expose: ["8080"]
    volumes:
      - uploads_data:/app/wwwroot/uploads
    networks: [studlab_net]
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:

networks:
  studlab_net:
    external: true
    name: studlab_net
